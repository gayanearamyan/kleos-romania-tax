<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kleos — Hiring contractors in Romania: taxes, explained</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ============================================================
   KLEOS DESIGN TOKENS — sampled from brand deliverables
   ============================================================ */
:root{
  --orange:#F66200;        /* primary CTA / hero accents */
  --orange-dark:#D95600;
  --ink:#141414;           /* headlines, body */
  --green:#009423;         /* action green: buttons, checks */
  --green-dark:#024616;    /* deep green section backgrounds */
  --grey:#F5F5F5;          /* quiet surfaces, secondary buttons */
  --grey-mid:#8A8A8A;      /* secondary text */
  --grey-line:#E6E6E6;
  --white:#FFFFFF;
  --radius-card:24px;
  --radius-btn:12px;
  --font:'Archivo',-apple-system,'Helvetica Neue',Arial,sans-serif;
  --maxw:1160px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:var(--font);color:var(--ink);background:var(--white);line-height:1.5;-webkit-font-smoothing:antialiased}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

/* ---------- type scale ---------- */
h1{font-size:clamp(2.6rem,6vw,4.6rem);font-weight:800;letter-spacing:-.03em;line-height:1.02}
h2{font-size:clamp(1.9rem,4vw,3rem);font-weight:800;letter-spacing:-.025em;line-height:1.06}
h3{font-size:1.25rem;font-weight:700;letter-spacing:-.01em}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:.85rem;font-weight:600;color:var(--grey-mid);margin-bottom:16px}
.eyebrow .dot{width:8px;height:8px;border-radius:50%;background:var(--green)}
p.lead{font-size:1.15rem;color:#444;max-width:56ch}
.muted{color:var(--grey-mid)}

/* ---------- buttons (Kleos: label + arrow segment) ---------- */
.btn{display:inline-flex;align-items:stretch;border-radius:var(--radius-btn);overflow:hidden;font-weight:600;font-size:.95rem}
.btn .lbl{padding:12px 18px;display:flex;align-items:center}
.btn .arr{padding:12px 14px;display:flex;align-items:center;border-left:1px solid rgba(255,255,255,.25)}
.btn svg{width:16px;height:16px}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:var(--orange-dark)}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#007A1D}
.btn-grey{background:var(--grey);color:var(--ink)}
.btn-grey .arr{border-left:1px solid #DDD}
.btn-grey:hover{background:#ECECEC}

/* ---------- nav ---------- */
nav{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--grey-line)}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-weight:800;font-size:1.7rem;letter-spacing:-.04em}
.nav-links{display:flex;gap:26px;font-size:.92rem;font-weight:500}
.nav-right{display:flex;gap:10px;align-items:center}
.lang-toggle{display:flex;background:var(--grey);border-radius:10px;padding:3px}
.lang-toggle button{background:transparent;border-radius:8px;padding:6px 12px;font-weight:600;font-size:.85rem;color:var(--grey-mid)}
.lang-toggle button.active{background:var(--ink);color:#fff}
@media(max-width:820px){.nav-links{display:none}}

/* ---------- hero ---------- */
.hero{padding:84px 0 56px}
.hero h1{max-width:15ch;margin:14px 0 22px}
.hero h1 .accent{color:var(--orange)}
.hero .cta-row{display:flex;gap:12px;margin-top:30px;flex-wrap:wrap}
.facts{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--grey-line);border:1px solid var(--grey-line);border-radius:var(--radius-card);overflow:hidden;margin:64px 0 0}
.fact{background:#fff;padding:24px 22px}
.fact .num{font-size:1.7rem;font-weight:800;letter-spacing:-.02em}
.fact .lab{font-size:.85rem;color:var(--grey-mid);margin-top:4px}
@media(max-width:820px){.facts{grid-template-columns:repeat(2,1fr)}}

/* ---------- section shells ---------- */
section{padding:88px 0}
.sec-dark{background:var(--green-dark);color:#fff;position:relative;overflow:hidden}
.sec-dark h2{color:#fff}
.sec-dark .coins{position:absolute;inset:0;pointer-events:none;opacity:.55}
.sec-dark .coin{position:absolute;border-radius:50%;background:radial-gradient(circle at 35% 35%,#66D97A,#0B7A2C 68%,#053d16);box-shadow:0 6px 0 #032a0f;display:flex;align-items:center;justify-content:center;color:rgba(2,70,22,.85);font-weight:800;transform:rotate(-12deg)}
.sec-orange{background:var(--orange);color:#fff}
.sec-orange h2{color:#fff}
.sec-head{max-width:640px;margin-bottom:44px}
.sec-head p{margin-top:14px;font-size:1.08rem;opacity:.85}

/* ---------- calculator card ---------- */
.calc-card{background:#fff;color:var(--ink);border-radius:var(--radius-card);padding:34px;position:relative;z-index:2;box-shadow:0 24px 60px rgba(0,0,0,.28)}
.calc-grid{display:grid;grid-template-columns:340px 1fr;gap:40px}
@media(max-width:900px){.calc-grid{grid-template-columns:1fr}}
.regime-tabs{display:flex;background:var(--grey);border-radius:12px;padding:4px;margin-bottom:22px}
.regime-tabs button{flex:1;background:transparent;border-radius:9px;padding:10px 6px;font-weight:600;font-size:.83rem;color:var(--grey-mid);line-height:1.2}
.regime-tabs button.active{background:var(--ink);color:#fff}
.mode-tabs{display:flex;gap:18px;margin-bottom:20px;font-weight:700;font-size:.95rem}
.mode-tabs button{background:none;color:var(--grey-mid);padding:0 0 6px;border-bottom:2px solid transparent}
.mode-tabs button.active{color:var(--ink);border-bottom-color:var(--orange)}
.field{margin-bottom:18px}
.field label{display:block;font-size:.85rem;font-weight:600;margin-bottom:7px}
.field input[type=number]{width:100%;padding:12px 14px;border:1px solid var(--grey-line);border-radius:10px;font-family:var(--font);font-size:1rem;font-weight:600}
.field input:focus{outline:2px solid var(--orange);outline-offset:1px;border-color:transparent}
.field .hint{font-size:.78rem;color:var(--grey-mid);margin-top:5px}
.check-row{display:flex;align-items:flex-start;gap:10px;margin:14px 0;font-size:.9rem;cursor:pointer}
.check-row input{margin-top:3px;accent-color:var(--green);width:16px;height:16px}

/* waterfall — the signature element */
.wf-bar{display:flex;height:58px;border-radius:14px;overflow:hidden;margin:18px 0 10px;background:var(--grey)}
.wf-seg{transition:width .55s cubic-bezier(.22,.9,.3,1);min-width:0}
.wf-seg.net{background:var(--green)}
.wf-seg.cas{background:var(--green-dark)}
.wf-seg.cass{background:var(--orange)}
.wf-seg.tax{background:var(--ink)}
.wf-legend{display:flex;flex-wrap:wrap;gap:16px;font-size:.8rem;margin-bottom:22px}
.wf-legend span{display:inline-flex;align-items:center;gap:6px}
.wf-legend i{width:11px;height:11px;border-radius:3px;display:inline-block}
.res-rows{border-top:1px solid var(--grey-line)}
.res-row{display:flex;justify-content:space-between;align-items:baseline;padding:13px 0;border-bottom:1px solid var(--grey-line);font-size:.95rem}
.res-row .amt{font-weight:700;font-variant-numeric:tabular-nums}
.res-row.total{font-size:1.05rem}
.res-row.total .amt{font-size:1.5rem;font-weight:800;color:var(--green)}
.res-row .sub{font-size:.78rem;color:var(--grey-mid)}
.big-net{background:var(--grey);border-radius:16px;padding:20px 22px;margin-top:20px;display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap}
.big-net .v{font-size:2rem;font-weight:800;letter-spacing:-.02em}
.big-net .v small{font-size:1rem;color:var(--grey-mid);font-weight:600}
.eff{font-size:.85rem;color:var(--grey-mid)}
.assump{margin-top:18px;font-size:.78rem;color:var(--grey-mid);line-height:1.55}

/* ---------- three taxes ---------- */
.tax3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:900px){.tax3{grid-template-columns:1fr}}
.tax-card{border:1px solid var(--grey-line);border-radius:var(--radius-card);padding:28px}
.tax-card .pct{font-size:2.6rem;font-weight:800;letter-spacing:-.03em}
.tax-card .pct.o{color:var(--orange)} .tax-card .pct.g{color:var(--green)} .tax-card .pct.d{color:var(--green-dark)}
.tax-card h3{margin:6px 0 10px}
.tax-card p{font-size:.92rem;color:#555}
.tax-card .thresholds{margin-top:16px;font-size:.85rem}
.tax-card .thresholds div{display:flex;justify-content:space-between;padding:7px 0;border-top:1px dashed var(--grey-line)}
.tax-card .thresholds b{font-variant-numeric:tabular-nums}

/* timeline (Kleos "Today, 2pm" pattern) */
.timeline{max-width:720px;margin-top:56px}
.tl-item{display:grid;grid-template-columns:150px 1fr;gap:22px;padding:20px 0;position:relative}
.tl-item::before{content:'';position:absolute;left:161px;top:34px;bottom:-6px;width:1px;background:var(--grey-line)}
.tl-item:last-child::before{display:none}
.tl-when{font-size:.87rem;color:var(--grey-mid);text-align:right;padding-top:2px;position:relative}
.tl-when::after{content:'';position:absolute;right:-15px;top:8px;width:7px;height:7px;border-radius:50%;background:var(--green)}
.tl-what h3{font-size:1.05rem}
.tl-what p{font-size:.9rem;color:var(--grey-mid);margin-top:4px}
@media(max-width:640px){.tl-item{grid-template-columns:110px 1fr}.tl-item::before{left:121px}}

/* ---------- misclassification (orange) ---------- */
.criteria-card{background:#fff;color:var(--ink);border-radius:var(--radius-card);padding:34px;box-shadow:0 24px 60px rgba(0,0,0,.18)}
.crit{display:flex;gap:14px;padding:15px 0;border-bottom:1px solid var(--grey-line);align-items:flex-start;cursor:pointer}
.crit:last-of-type{border-bottom:none}
.crit .box{width:24px;height:24px;border-radius:50%;border:2px solid var(--grey-line);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.crit.on .box{background:var(--green);border-color:var(--green)}
.crit .box svg{width:13px;height:13px;opacity:0;transition:.15s}
.crit.on .box svg{opacity:1}
.crit p{font-size:.95rem;line-height:1.45}
.verdict{margin-top:22px;padding:18px 20px;border-radius:14px;font-weight:600;font-size:.95rem;background:var(--grey)}
.verdict.ok{background:#E6F6EA;color:var(--green-dark)}
.verdict.risk{background:#FDEDE3;color:#9A3D00}

/* ---------- cases grid ---------- */
.cases{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
@media(max-width:900px){.cases{grid-template-columns:1fr 1fr}}
@media(max-width:640px){.cases{grid-template-columns:1fr}}
.case-card{background:var(--grey);border-radius:var(--radius-card);padding:26px;transition:.15s}
.case-card:hover{transform:translateY(-3px)}
.case-card .emoji{font-size:1.6rem}
.case-card h3{margin:12px 0 8px;font-size:1.02rem}
.case-card p{font-size:.88rem;color:#555}
.case-card .delta{display:inline-block;margin-top:12px;font-size:.8rem;font-weight:700;padding:4px 10px;border-radius:99px}
.delta.down{background:#E6F6EA;color:var(--green-dark)}
.delta.up{background:#FDEDE3;color:#9A3D00}
.delta.info{background:#EAEAEA;color:#444}

/* ---------- FAQ ---------- */
.faq-item{border-bottom:1px solid var(--grey-line)}
.faq-q{width:100%;display:flex;justify-content:space-between;align-items:center;gap:16px;background:none;padding:22px 0;text-align:left;font-size:1.05rem;font-weight:700;color:var(--ink)}
.faq-q .plus{width:28px;height:28px;border-radius:50%;background:var(--grey);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-weight:600;transition:.2s}
.faq-item.open .plus{transform:rotate(45deg);background:var(--ink);color:#fff}
.faq-a{max-height:0;overflow:hidden;transition:max-height .3s ease}
.faq-a p{padding:0 40px 22px 0;font-size:.95rem;color:#555;max-width:70ch}

/* ---------- footer CTA ---------- */
.foot-cta{background:var(--ink);color:#fff;border-radius:var(--radius-card);padding:52px;display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap}
.foot-cta h2{color:#fff;font-size:clamp(1.6rem,3vw,2.4rem);max-width:20ch}
footer{padding:44px 0 60px;font-size:.8rem;color:var(--grey-mid)}
.disclaimer{max-width:78ch;line-height:1.6;margin-top:12px}
:focus-visible{outline:2px solid var(--orange);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>

<nav>
  <div class="wrap nav-inner">
    <a class="logo" href="#top">Kleos</a>
    <div class="nav-links">
      <a href="#calculator" data-i18n="nav_calc"></a>
      <a href="#how" data-i18n="nav_how"></a>
      <a href="#classification" data-i18n="nav_class"></a>
      <a href="#cases" data-i18n="nav_cases"></a>
      <a href="#faq">FAQ</a>
    </div>
    <div class="nav-right">
      <div class="lang-toggle" role="group" aria-label="Language">
        <button id="lang-en" onclick="setLang('en')">EN</button>
        <button id="lang-ro" onclick="setLang('ro')">RO</button>
      </div>
      <a class="btn btn-orange" href="#calculator"><span class="lbl" data-i18n="nav_cta"></span><span class="arr">&#8594;</span></a>
    </div>
  </div>
</nav>

<!-- HERO -->
<header class="hero" id="top">
  <div class="wrap">
    <span class="eyebrow"><span class="dot"></span><span data-i18n="hero_eyebrow"></span></span>
    <h1 data-i18n-html="hero_h1"></h1>
    <p class="lead" data-i18n="hero_lead"></p>
    <div class="cta-row">
      <a class="btn btn-green" href="#calculator"><span class="lbl" data-i18n="hero_cta1"></span><span class="arr">&#8594;</span></a>
      <a class="btn btn-grey" href="#how"><span class="lbl" data-i18n="hero_cta2"></span><span class="arr">&#8594;</span></a>
    </div>
    <div class="facts">
      <div class="fact"><div class="num">10%</div><div class="lab" data-i18n="fact_flat"></div></div>
      <div class="fact"><div class="num">4,050 RON</div><div class="lab" data-i18n="fact_minwage"></div></div>
      <div class="fact"><div class="num">25 <span data-i18n="fact_may"></span></div><div class="lab" data-i18n="fact_deadline"></div></div>
      <div class="fact"><div class="num">3</div><div class="lab" data-i18n="fact_regimes"></div></div>
    </div>
  </div>
</header>

<!-- CALCULATOR -->
<section class="sec-dark" id="calculator">
  <div class="coins" id="coins"></div>
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i18n="calc_h2"></h2>
      <p data-i18n="calc_sub"></p>
    </div>
    <div class="calc-card">
      <div class="calc-grid">
        <div>
          <div class="regime-tabs" role="tablist">
            <button id="tab-real" class="active" onclick="setRegime('real')">PFA<br><span style="font-weight:500" data-i18n="tab_real"></span></button>
            <button id="tab-norma" onclick="setRegime('norma')">PFA<br><span style="font-weight:500" data-i18n="tab_norma"></span></button>
            <button id="tab-srl" onclick="setRegime('srl')">Micro-SRL<br><span style="font-weight:500" data-i18n="tab_srl"></span></button>
          </div>
          <div class="mode-tabs">
            <button id="mode-fwd" class="active" onclick="setMode('fwd')" data-i18n="mode_fwd"></button>
            <button id="mode-rev" onclick="setMode('rev')" data-i18n="mode_rev"></button>
          </div>
          <div class="field" id="f-gross">
            <label for="in-gross" data-i18n="lbl_gross"></label>
            <input type="number" id="in-gross" value="240000" min="0" step="1000" oninput="calc()">
            <div class="hint" id="gross-eur"></div>
          </div>
          <div class="field" id="f-net" style="display:none">
            <label for="in-net" data-i18n="lbl_net_target"></label>
            <input type="number" id="in-net" value="12000" min="0" step="500" oninput="calc()">
            <div class="hint" data-i18n="hint_net_target"></div>
          </div>
          <div class="field" id="f-exp">
            <label for="in-exp" data-i18n="lbl_exp"></label>
            <input type="number" id="in-exp" value="12000" min="0" step="500" oninput="calc()">
            <div class="hint" data-i18n="hint_exp"></div>
          </div>
          <div class="field" id="f-norm" style="display:none">
            <label for="in-norm" data-i18n="lbl_norm"></label>
            <input type="number" id="in-norm" value="45000" min="0" step="1000" oninput="calc()">
            <div class="hint" data-i18n="hint_norm"></div>
          </div>
          <label class="check-row" id="f-salaried">
            <input type="checkbox" id="in-salaried" onchange="calc()">
            <span data-i18n="chk_salaried"></span>
          </label>
          <label class="check-row" id="f-srl3" style="display:none">
            <input type="checkbox" id="in-srl3" onchange="calc()">
            <span data-i18n="chk_srl3"></span>
          </label>
        </div>
        <div>
          <div class="wf-bar" id="wf" aria-hidden="true"></div>
          <div class="wf-legend">
            <span><i style="background:var(--green)"></i><span data-i18n="leg_net"></span></span>
            <span><i style="background:var(--green-dark)"></i><span id="leg-cas"></span></span>
            <span><i style="background:var(--orange)"></i><span id="leg-cass"></span></span>
            <span><i style="background:var(--ink)"></i><span id="leg-tax"></span></span>
          </div>
          <div class="res-rows" id="rows"></div>
          <div class="big-net">
            <div>
              <div class="eff" data-i18n="res_monthly"></div>
              <div class="v" id="net-month"></div>
            </div>
            <div style="text-align:right">
              <div class="eff" data-i18n="res_effective"></div>
              <div class="v" id="eff-rate"></div>
            </div>
          </div>
          <div class="assump" id="assump"></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- HOW IT WORKS -->
<section id="how">
  <div class="wrap">
    <div class="sec-head">
      <span class="eyebrow"><span class="dot"></span><span data-i18n="how_eyebrow"></span></span>
      <h2 data-i18n="how_h2"></h2>
      <p class="muted" data-i18n="how_sub"></p>
    </div>
    <div class="tax3">
      <div class="tax-card">
        <div class="pct d">10%</div>
        <h3 data-i18n="t1_h"></h3>
        <p data-i18n="t1_p"></p>
        <div class="thresholds">
          <div><span data-i18n="t1_r1"></span><b data-i18n="t1_v1"></b></div>
          <div><span data-i18n="t1_r2"></span><b>25 <span data-i18n="fact_may"></span></b></div>
        </div>
      </div>
      <div class="tax-card">
        <div class="pct g">25%</div>
        <h3>CAS <span class="muted" style="font-weight:500" data-i18n="t2_hs"></span></h3>
        <p data-i18n="t2_p"></p>
        <div class="thresholds">
          <div><span data-i18n="t2_r1"></span><b>0 RON</b></div>
          <div><span data-i18n="t2_r2"></span><b>12,150 RON</b></div>
          <div><span data-i18n="t2_r3"></span><b>24,300 RON</b></div>
        </div>
      </div>
      <div class="tax-card">
        <div class="pct o">10%</div>
        <h3>CASS <span class="muted" style="font-weight:500" data-i18n="t3_hs"></span></h3>
        <p data-i18n="t3_p"></p>
        <div class="thresholds">
          <div><span data-i18n="t3_r1"></span><b>2,430 RON</b></div>
          <div><span data-i18n="t3_r2"></span><b>10% × <span data-i18n="t3_net"></span></b></div>
          <div><span data-i18n="t3_r3"></span><b>29,160 RON</b></div>
        </div>
      </div>
    </div>
    <div class="timeline">
      <h3 style="font-size:1.4rem;margin-bottom:8px" data-i18n="tl_h"></h3>
      <div class="tl-item"><div class="tl-when" data-i18n="tl1_w"></div><div class="tl-what"><h3 data-i18n="tl1_h"></h3><p data-i18n="tl1_p"></p></div></div>
      <div class="tl-item"><div class="tl-when" data-i18n="tl2_w"></div><div class="tl-what"><h3 data-i18n="tl2_h"></h3><p data-i18n="tl2_p"></p></div></div>
      <div class="tl-item"><div class="tl-when" data-i18n="tl3_w"></div><div class="tl-what"><h3 data-i18n="tl3_h"></h3><p data-i18n="tl3_p"></p></div></div>
      <div class="tl-item"><div class="tl-when" data-i18n="tl4_w"></div><div class="tl-what"><h3 data-i18n="tl4_h"></h3><p data-i18n="tl4_p"></p></div></div>
    </div>
  </div>
</section>

<!-- CLASSIFICATION -->
<section class="sec-orange" id="classification">
  <div class="wrap">
    <div class="sec-head">
      <h2 data-i18n="cl_h2"></h2>
      <p data-i18n="cl_sub"></p>

<script>
/* ============================================================
   TAX_CONFIG — Romania, fiscal year 2026. Update annually.
   All thresholds anchor to the minimum gross wage in force on
   Jan 1 of the income year (Codul fiscal, L227/2015).
   ============================================================ */
const TAX_CONFIG = {
  year: 2026,
  minWage: 4050,            // RON/month, Jan 1 2026 anchor
  eurRon: 5.07,             // indicative rates for display only
  usdRon: 4.62,             // update alongside eurRon
  incomeTaxRate: 0.10,
  cas:  { rate: 0.25, t1: 12, t2: 24 },      // thresholds in min-wage multiples
  cass: { rate: 0.10, floor: 6, cap: 72 },   // cap raised 60 → 72 in 2026
  micro: {
    revTaxLow: 0.01, revTaxHigh: 0.03,
    highThresholdEur: 60000,
    dividendTax: 0.16,                        // raised to 16% from 2026
    cassBands: [6, 12, 24]                    // dividend CASS capped bands
  }
};
const SM = TAX_CONFIG.minWage;
const fmt = n => Math.round(n).toLocaleString('en-US').replace(/,/g, '\u202F') + ' RON';
const fmtEur = n => '≈ €' + Math.round(n / TAX_CONFIG.eurRon).toLocaleString('en-US');
const fmtUsd = n => '$' + Math.round(n / TAX_CONFIG.usdRon).toLocaleString('en-US');
const fmtFx  = n => fmtEur(n) + ' / ' + fmtUsd(n);

/* ---------- core engines ---------- */
function calcPFAReal(gross, expenses, salaried){
  const net = Math.max(0, gross - expenses);
  let casBase = 0;
  const t1 = TAX_CONFIG.cas.t1 * SM * 1, t2 = TAX_CONFIG.cas.t2 * SM * 1; // 48,600 / 97,200 RON in 2026
  if (net >= t2) casBase = t2; else if (net >= t1) casBase = t1;
  const cas = casBase * TAX_CONFIG.cas.rate;
  const floor = TAX_CONFIG.cass.floor * SM, cap = TAX_CONFIG.cass.cap * SM;
  let cassBase;
  if (net <= 0) cassBase = 0;
  else if (net < floor) cassBase = salaried ? net : floor;
  else cassBase = Math.min(net, cap);
  const cass = cassBase * TAX_CONFIG.cass.rate;
  const taxable = Math.max(0, net - cas - cass);
  const tax = taxable * TAX_CONFIG.incomeTaxRate;
  return { gross, pieces: { cas, cass, tax }, net: gross - expenses - cas - cass - tax, expenses };
}
function calcPFANorma(gross, norm, salaried){
  const t1 = TAX_CONFIG.cas.t1 * SM, t2 = TAX_CONFIG.cas.t2 * SM;
  let casBase = 0;
  if (norm >= t2) casBase = t2; else if (norm >= t1) casBase = t1;
  const cas = casBase * TAX_CONFIG.cas.rate;
  const floor = TAX_CONFIG.cass.floor * SM, cap = TAX_CONFIG.cass.cap * SM;
  let cassBase;
  if (norm <= 0) cassBase = 0;
  else if (norm < floor) cassBase = salaried ? norm : floor;
  else cassBase = Math.min(norm, cap);
  const cass = cassBase * TAX_CONFIG.cass.rate;
  const tax = Math.max(0, norm) * TAX_CONFIG.incomeTaxRate;
  return { gross, pieces: { cas, cass, tax }, net: gross - cas - cass - tax, expenses: 0 };
}
function calcMicroSRL(gross, expenses, highRate){
  const m = TAX_CONFIG.micro;
  const overThreshold = gross > m.highThresholdEur * TAX_CONFIG.eurRon;
  const rate = (highRate || overThreshold) ? m.revTaxHigh : m.revTaxLow;
  const revTax = gross * rate;
  const profit = Math.max(0, gross - expenses - revTax);
  const divTax = profit * m.dividendTax;
  const dividendsNetOfTax = profit - divTax;
  // CASS on dividends: banded, capped at 24 SM base
  let cassBase = 0;
  const [b6, b12, b24] = m.cassBands.map(x => x * SM);
  if (profit >= b24) cassBase = b24;
  else if (profit >= b12) cassBase = b12;
  else if (profit >= b6) cassBase = b6;
  const cass = cassBase * TAX_CONFIG.cass.rate;
  return { gross, pieces: { cas: revTax, cass, tax: divTax }, net: dividendsNetOfTax - cass, expenses };
}
function compute(gross){
  const exp = +document.getElementById('in-exp').value || 0;
  const salaried = document.getElementById('in-salaried').checked;
  if (state.regime === 'real')  return calcPFAReal(gross, exp, salaried);
  if (state.regime === 'norma') return calcPFANorma(gross, +document.getElementById('in-norm').value || 0, salaried);
  return calcMicroSRL(gross, exp, document.getElementById('in-srl3').checked);
}
function solveGross(targetNetMonthly){
  const target = targetNetMonthly * 12;
  let lo = 0, hi = 5000000;
  for (let i = 0; i < 60; i++){
    const mid = (lo + hi) / 2;
    if (compute(mid).net < target) lo = mid; else hi = mid;
  }
  return hi;
}

/* ---------- state & render ---------- */
const state = { lang:'en', regime:'real', mode:'fwd', crit:[0,0,0,0,0,0,0] };
const $ = id => document.getElementById(id);
const T = () => I18N[state.lang];

function setLang(l){
  state.lang = l;
  $('lang-en').classList.toggle('active', l==='en');
  $('lang-ro').classList.toggle('active', l==='ro');
  document.documentElement.lang = l;
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = T()[el.dataset.i18n] ?? el.dataset.i18n; });
  document.querySelectorAll('[data-i18n-html]').forEach(el => { el.innerHTML = T()[el.dataset.i18nHtml] ?? ''; });
  renderCriteria(); renderCases(); renderFAQ(); calc();
}
function setRegime(r){
  state.regime = r;
  ['real','norma','srl'].forEach(x => $('tab-'+x).classList.toggle('active', x===r));
  $('f-exp').style.display   = (r==='norma') ? 'none' : '';
  $('f-norm').style.display  = (r==='norma') ? '' : 'none';
  $('f-salaried').style.display = (r==='srl') ? 'none' : '';
  $('f-srl3').style.display  = (r==='srl') ? '' : 'none';
  calc();
}
function setMode(m){
  state.mode = m;
  $('mode-fwd').classList.toggle('active', m==='fwd');
  $('mode-rev').classList.toggle('active', m==='rev');
  $('f-gross').style.display = m==='fwd' ? '' : 'none';
  $('f-net').style.display   = m==='rev' ? '' : 'none';
  calc();
}
function row(label, amt, sub){
  return `<div class="res-row"><span>${label}${sub?`<div class="sub">${sub}</div>`:''}</span><span class="amt">${amt}</span></div>`;
}
function calc(){
  let gross, revNote = '';
  if (state.mode === 'rev'){
    const targetM = +$('in-net').value || 0;
    gross = solveGross(targetM);
    revNote = T().rev_result
      .replace('{NET}', fmt(targetM)).replace('{GROSS}', fmt(gross)).replace('{MONTH}', fmt(gross/12));
  } else {
    gross = +$('in-gross').value || 0;
  }
  $('gross-eur').textContent = state.mode==='fwd' ? fmtFx(gross) + (state.lang==='ro'?' / an':' / year') : '';
  const r = compute(gross);
  const { cas, cass, tax } = r.pieces;
  const totalOut = cas + cass + tax + (state.regime!=='norma' ? r.expenses : 0);
  // waterfall (relative to gross)
  const g = Math.max(1, gross);
  const segs = [
    ['net',  Math.max(0,r.net)/g],
    ['cas',  cas/g],
    ['cass', cass/g],
    ['tax',  tax/g]
  ];
  $('wf').innerHTML = segs.map(([c,w]) => `<div class="wf-seg ${c}" style="width:${Math.min(100,w*100)}%"></div>`).join('');
  // legend labels differ per regime
  const isSRL = state.regime==='srl';
  $('leg-cas').textContent  = isSRL ? T().r_revtax : 'CAS 25%';
  $('leg-cass').textContent = isSRL ? T().r_cassdiv : 'CASS 10%';
  $('leg-tax').textContent  = isSRL ? T().r_divtax : T().r_tax;
  // rows
  let html = row(T().r_gross, fmt(gross));
  if (state.regime !== 'norma' && r.expenses > 0) html += row(T().r_exp, '\u2212 ' + fmt(r.expenses));
  html += row(isSRL ? T().r_revtax : T().r_cas,  '\u2212 ' + fmt(cas));
  html += row(isSRL ? T().r_cassdiv : T().r_cass, '\u2212 ' + fmt(cass));
  html += row(isSRL ? T().r_divtax : T().r_tax,  '\u2212 ' + fmt(tax));
  html += `<div class="res-row total"><span>${T().r_net}</span><span class="amt">${fmt(r.net)}</span></div>`;
  $('rows').innerHTML = html;
  $('net-month').innerHTML = fmt(r.net/12) + ' <small>' + fmtFx(r.net/12) + '</small>';
  const effBase = gross - (state.regime!=='norma' ? r.expenses : 0);
  $('eff-rate').textContent = effBase > 0 ? ((cas+cass+tax)/effBase*100).toFixed(1) + '%' : '\u2014';
  $('assump').textContent = (revNote ? revNote + ' \u2014 ' : '') + T()['assump_' + state.regime];
}

/* ---------- criteria ---------- */
function renderCriteria(){
  $('criteria').innerHTML = T().criteria.map((c,i)=>`
    <div class="crit ${state.crit[i]?'on':''}" onclick="toggleCrit(${i})" role="checkbox" aria-checked="${!!state.crit[i]}" tabindex="0" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCrit(${i})}">
      <span class="box"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
      <p>${c}</p>
    </div>`).join('');
  renderVerdict();
}
function toggleCrit(i){ state.crit[i] = state.crit[i]?0:1; renderCriteria(); }
function renderVerdict(){
  const n = state.crit.reduce((a,b)=>a+b,0);
  const v = $('verdict');
  if (state.crit.every(x=>!x)) { v.className='verdict'; v.textContent = T().verdict_start; return; }
  const ok = n >= 4;
  v.className = 'verdict ' + (ok?'ok':'risk');
  v.textContent = (ok?T().verdict_ok:T().verdict_risk).replace('{N}', n);
}

/* ---------- cases & faq ---------- */
function renderCases(){
  $('cases-grid').innerHTML = T().cases.map(c=>`
    <div class="case-card"><div class="emoji">${c.e}</div><h3>${c.h}</h3><p>${c.p}</p><span class="delta ${c.t}">${c.d}</span></div>`).join('');
}
function renderFAQ(){
  $('faq-list').innerHTML = T().faq.map((f,i)=>`
    <div class="faq-item" id="fq${i}">
      <button class="faq-q" onclick="toggleFAQ(${i})" aria-expanded="false">${f.q}<span class="plus">+</span></button>
      <div class="faq-a"><p>${f.a}</p></div>
    </div>`).join('');
}
function toggleFAQ(i){
  const item = $('fq'+i), a = item.querySelector('.faq-a'), open = item.classList.toggle('open');
  a.style.maxHeight = open ? a.scrollHeight + 'px' : 0;
  item.querySelector('.faq-q').setAttribute('aria-expanded', open);
}

  const spots = [[6,12,70],[14,72,110],[86,18,90],[92,64,130],[78,88,60],[3,88,95],[55,94,55],[95,38,70]];
  c.innerHTML = spots.map(([x,y,s])=>`<div class="coin" style="left:${x}%;top:${y}%;width:${s}px;height:${s}px;font-size:${s*.45}px">$</div>`).join('');
})();

setRegime('real');
setLang('en');
</script>
